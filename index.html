<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sparten</title>

    <!-- Preconnect to critical CDNs -->
    <link
      rel="preconnect"
      href="https://site-assets.fontawesome.com"
      crossorigin
    />

    <!-- Load critical CSS early -->
    <link href="/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Load non-critical CSS async (print hack) -->
    <link
      href="/css/animation.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <link
      href="/css/custom.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="/css/s-style.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="/css/t-style.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="/css/s-responsive.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="/css/t-responsive.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="/css/all.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <!-- FontAwesome with font-display swap -->
    <link
      href="https://site-assets.fontawesome.com/releases/v6.5.2/css/all.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Fallback for no-JS users -->
    <noscript>
      <link href="/css/animation.css" rel="stylesheet" />
      <link href="/css/custom.css" rel="stylesheet" />
      <link href="/css/s-style.css" rel="stylesheet" />
      <link href="/css/t-style.css" rel="stylesheet" />
      <link href="/css/s-responsive.css" rel="stylesheet" />
      <link href="/css/t-responsive.css" rel="stylesheet" />
      <link href="/css/all.css" rel="stylesheet" />
      <link
        href="https://site-assets.fontawesome.com/releases/v6.5.2/css/all.css"
        rel="stylesheet"
      />
    </noscript>
  </head>

  <body>
    <div id="root"></div>

    <!-- Vite app entry (keep this first and as `type=module`) -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Defer JS to avoid render-blocking -->
    <script src="/js/jquery.js" defer></script>
    <script src="/js/bootstrap.min.js" defer></script>
    <script src="/js/custom.js" defer></script>
    <script src="/js/animation.js" defer></script>
  </body>
</html>
